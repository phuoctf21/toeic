<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Học 574 Từ Vựng TOEIC Master</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .stats-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: bold;
        }

        .controls-container {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .selector-box select {
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .mode-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 5px;
        }

        .btn-mode { background-color: #e2e8f0; color: var(--text-color); }
        .btn-mode.active { background-color: var(--primary-color); color: white; }

        .main-content {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Flashcard Styles */
        .flashcard-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .flashcard {
            width: 380px;
            height: 240px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            border-radius: 15px;
        }

        .flashcard.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .card-front { background-color: white; color: #1e3a8a; }
        .card-back { background-color: #eff6ff; color: var(--text-color); transform: rotateY(180deg); }
        .card-vocab { font-size: 26px; font-weight: bold; margin-bottom: 10px; color: #b91c1c; }
        .card-ipa { font-size: 18px; color: #64748b; font-style: italic; }
        .card-meaning { font-size: 22px; font-weight: bold; color: var(--success-color); }

        .card-nav {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            align-items: center;
        }

        .card-nav button {
            padding: 10px 25px;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Quiz Styles */
        .quiz-wrapper {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .quiz-question { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #1e3a8a; }
        .quiz-options { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        @media(min-width: 600px) { .quiz-options { grid-template-columns: 1fr 1fr; } }

        .option-btn {
            padding: 15px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) { border-color: var(--primary-color); background-color: #f0fdf4; }
        .option-btn.correct { background-color: #bbf7d0 !important; border-color: var(--success-color) !important; color: #16a34a; font-weight: bold; }
        .option-btn.wrong { background-color: #fca5a5 !important; border-color: var(--danger-color) !important; color: #b91c1c; }

        /* List View Styles */
        .part-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 3px rgb(0 0 0 / 0.1); }
        .part-header { font-size: 18px; font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #eff6ff; padding-bottom: 10px; margin-bottom: 15px; }
        
        .vocab-table { width: 100%; border-collapse: collapse; text-align: left; }
        .vocab-table th, .vocab-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .vocab-table th { background-color: #f8fafc; color: #64748b; font-weight: 600; }
        .vocab-table tr:hover { background-color: #faf5ff; }
        .td-word { font-weight: bold; color: #2563eb; }
    </style>
</head>

                    { stt: 18, word: "residence (n)", ipa: "/ˈrezɪdəns/", meaning: "nhà ở, sự định cư" },
                    { stt: 19, word: "in the meantime", ipa: "", meaning: "trong lúc đó" },
                    { stt: 20, word: "refinish (v)", ipa: "/ˌriːˈfɪnɪʃ/", meaning: "hoàn thiện lại" },
                    { stt: 21, word: "furnish (v)", ipa: "/ˈfɜːrnɪʃ/", meaning: "trang trí nội thất / một căn hộ có nội thất" },
                    { stt: 22, word: "subscription (n)", ipa: "/səbˈskrɪpʃn/", meaning: "sự đặt mua dài hạn" },
                    { stt: 23, word: "consider (v)", ipa: "/kənˈsɪdər/", meaning: "cân nhắc, xem xét / xét về / xem N1 như N2" },
                    { stt: 24, word: "rate (n)", ipa: "/reɪt/", meaning: "giá cả / ở mức giá theo năm" },
                    { stt: 25, word: "timely (adj)", ipa: "/ˈtaɪmli/", meaning: "đúng thời gian" },
                    { stt: 26, word: "reminder (n)", ipa: "/rɪˈmaɪndər/", meaning: "lời nhắc nhở / lời nhắc thanh toán" },
                    { stt: 27, word: "distributor (n)", ipa: "/dɪˈstrɪbjətər/", meaning: "nhà phân phối" },
                    { stt: 28, word: "thermometer (n)", ipa: "/θərˈmɑːmɪtər/", meaning: "nhiệt kế" },
                    { stt: 29, word: "bacteria (n)", ipa: "/bækˈtɪriə/", meaning: "vi khuẩn" },
                    { stt: 30, word: "be responsible for", ipa: "/rɪˈspɑːnsəbl/", meaning: "chịu trách nhiệm" },
                    { stt: 31, word: "ensure (v)", ipa: "/ɪnˈʃʊr/", meaning: "đảm bảo (* assure)" },
                    { stt: 32, word: "comply with", ipa: "/kəmˈplaɪ/", meaning: "tuân thủ / sự tuân thủ (n)" },
                    { stt: 33, word: "appropriate (a)", ipa: "/əˈproʊpriət/", meaning: "thích hợp, phù hợp" },
                    { stt: 34, word: "reliability (a)", ipa: "/rɪˌlaɪəˈbɪləti/", meaning: "đáng tin cậy (Sự đáng tin cậy)" },
                    { stt: 35, word: "typically (adv)", ipa: "/ˈtɪpɪkli/", meaning: "thường, đặc thù" },
                    { stt: 36, word: "speed (n)", ipa: "/spiːd/", meaning: "tốc độ / tốc độ internet" },
                    { stt: 37, word: "competitor (n)", ipa: "/kəmˈpetɪtər/", meaning: "đối thủ cạnh tranh" },
                    { stt: 38, word: "verify (v)", ipa: "/ˈverɪfaɪ/", meaning: "xác minh / sự xác minh (n)" },
                    { stt: 39, word: "complex (a)", ipa: "/kəmˈpleks/", meaning: "phức tạp / mật khẩu phức tạp" },
                    { stt: 40, word: "install (v)", ipa: "/ɪnˈstɔːl/", meaning: "lắp đặt / việc lắp đặt cửa sổ" },
                    { stt: 41, word: "clean-up (n)", ipa: "/ˈkliːn ʌp/", meaning: "việc dọn vệ sinh / dọn vệ sinh nhà ở" },
                    { stt: 42, word: "wall-to-wall (a)", ipa: "/ˌwɔːl tə ˈwɔːl/", meaning: "phủ kín sàn/ phòng / trải thảm sàn" },
                    { stt: 43, word: "access (n)", ipa: "/ˈækses/", meaning: "việc truy cập, lối vào / truy cập internet" },
                    { stt: 44, word: "agreement (n)", ipa: "/əˈɡriːmənt/", meaning: "thỏa thuận, hợp đồng / hợp đồng thuê" },
                    { stt: 45, word: "proof (n)", ipa: "/pruːf/", meaning: "bằng chứng / nộp bằng chứng thu nhập" },
                    { stt: 46, word: "administrator (n)", ipa: "/ədˈmɪnɪstreɪtər/", meaning: "nhân viên quản lý hành chính / quản lý văn phòng" },
                    { stt: 47, word: "graduate (n)", ipa: "/ˈɡrædʒuət/", meaning: "sinh viên mới tốt nghiệp / tốt nghiệp gần đây" },
                    { stt: 48, word: "describe (v)", ipa: "/dɪˈskraɪb/", meaning: "mô tả" },
                    { stt: 49, word: "occur (v)", ipa: "/əˈkɜːr/", meaning: "xuất hiện" },
                    { stt: 50, word: "free of charge", ipa: "", meaning: "miễn phí (* complimentary)" },
                    { stt: 51, word: "desirable (a)", ipa: "/dɪˈzaɪərəbl/", meaning: "mong muốn có / một loạt tính năng mong muốn" },
                    { stt: 52, word: "membership (n)", ipa: "/ˈmembərʃɪp/", meaning: "tư cách thành viên / phí thành viên thấp" },
                    { stt: 53, word: "prospective (a)", ipa: "/prəˈspektɪv/", meaning: "tiềm năng (* potential) / cư dân tiềm năng" },
                    { stt: 54, word: "acknowledge (v)", ipa: "/əkˈnɑːlɪdʒ/", meaning: "xác nhận, thừa nhận / xác nhận nhận bản ước tính" }
                ]
            }
        };

        let currentMode = 'list';
        let currentPart = 'all';
        let currentWordsActive = [];
        let cardIndex = 0;
        let currentQuizCorrectAnswer = "";

        window.onload = function() {
            renderListView();
            updateActiveWords();
        };

        function renderListView() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            for (let partKey in dataset) {
                if (currentPart !== 'all' && currentPart !== partKey) continue;

                const partData = dataset[partKey];
                const section = document.createElement('div');
                section.className = `part-section js-part-sec-${partKey}`;
                
                let tableRows = '';
                partData.words.forEach(w => {
                    tableRows += `
                        <tr class="vocab-row">
                            <td style="width: 60px; text-align:center; font-weight:bold;">${w.stt}</td>
                            <td class="td-word">${w.word}</td>
                            <td style="color: #64748b; font-style:italic;">${w.ipa}</td>
                            <td>${w.meaning}</td>
                        </tr>
                    `;
                });

                section.innerHTML = `
                    <div class="part-header">${partData.title} (${partData.words.length} từ)</div>
                    <table class="vocab-table">
                        <thead>
                            <tr>
                                <th style="text-align:center;">STT</th>
                                <th>Từ vựng</th>
                                <th>Phiên âm</th>
                                <th>Nghĩa tiếng Việt & Mở rộng</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                `;
                container.appendChild(section);
            }
        }

        function updateActiveWords() {
            if (currentPart === 'all') {
                currentWordsActive = [];
                for (let partKey in dataset) {
                    currentWordsActive = currentWordsActive.concat(dataset[partKey].words);
                }
            } else {
                currentWordsActive = dataset[currentPart].words;
            }
            cardIndex = 0;
            updateFlashcard();
        }

        function changePart() {
            currentPart = document.getElementById('part-selector').value;
            renderListView();
            updateActiveWords();
            if (currentMode === 'quiz') generateQuiz();
            document.getElementById('search-input').value = '';
        }

        function setViewMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-buttons button').forEach(b => b.classList.remove('active'));
            
            document.getElementById('list-container').style.display = 'none';
            document.getElementById('card-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'none';

            if (mode === 'list') {
                document.getElementById('btn-list').classList.add('active');
                document.getElementById('list-container').style.display = 'block';
                renderListView();
            } else if (mode === 'card') {
                document.getElementById('btn-card').classList.add('active');
                document.getElementById('card-container').style.display = 'flex';
                updateFlashcard();
            } else if (mode === 'quiz') {
                document.getElementById('btn-quiz').classList.add('active');
                document.getElementById('quiz-container').style.display = 'block';
                generateQuiz();
            }
        }

        function updateFlashcard() {
            if (currentWordsActive.length === 0) return;
            const card = currentWordsActive[cardIndex];
            document.querySelector('.flashcard').classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('fc-word').innerText = card.word;
                document.getElementById('fc-ipa').innerText = card.ipa || '—';
                document.getElementById('fc-meaning').innerText = card.meaning;
                document.getElementById('card-index').innerText = `${cardIndex + 1} / ${currentWordsActive.length}`;
            }, 150);
        }

        function moveCard(step) {
            cardIndex += step;
            if (cardIndex < 0) cardIndex = currentWordsActive.length - 1;
            if (cardIndex >= currentWordsActive.length) cardIndex = 0;
            updateFlashcard();
        }

        function generateQuiz() {
            if (currentWordsActive.length < 4) {
                document.getElementById('q-text').innerText = "Vui lòng chọn cấu phần có ít nhất 4 từ vựng để tạo bài trắc nghiệm!";
                document.getElementById('q-options').innerHTML = '';
                return;
            }

            const correctWordIndex = Math.floor(Math.random() * currentWordsActive.length);
            const target = currentWordsActive[correctWordIndex];
            currentQuizCorrectAnswer = target.meaning;

            document.getElementById('q-text').innerText = `Từ "${target.word}" ${target.ipa ? target.ipa : ''} có nghĩa là gì?`;

            let options = [target.meaning];
            while (options.length < 4) {
                const randIndex = Math.floor(Math.random() * currentWordsActive.length);
                const randMeaning = currentWordsActive[randIndex].meaning;
                if (!options.includes(randMeaning)) {
                    options.push(randMeaning);
                }
            }

            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('q-options');
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = function() { checkQuizAnswer(this, opt); };
                optionsContainer.appendChild(btn);
            });
        }

        function checkQuizAnswer(selectedBtn, answer) {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === currentQuizCorrectAnswer) {
                    btn.classList.add('correct');
                }
            });

            if (answer !== currentQuizCorrectAnswer) {
                selectedBtn.classList.add('wrong');
            }
        }

        function filterVocabulary() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const rows = document.querySelectorAll('.vocab-row');

            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                if (text.includes(query)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });

            for (let partKey in dataset) {
                const section = document.querySelector(`.js-part-sec-${partKey}`);
                if (!section) continue;
                const activeRows = section.querySelectorAll('.vocab-row:not([style*="display: none"])');
                if (activeRows.length === 0 && query !== '') {
                    section.style.display = 'none';
                } else {
                    section.style.display = 'block';
                }
            }
        }
    </script>
